<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lingbot WebRTC Viewer</title>
  <link rel="stylesheet" href="/static/request_session.css">
</head>
<body>
  <main class="appShell">
    <section class="stage" aria-label="Lingbot WebRTC Viewer">
      <h1 class="srOnly">Lingbot WebRTC Viewer</h1>
      <canvas id="mockCanvas" class="mockCanvas" aria-hidden="true"></canvas>
      <video id="remoteVideo" class="stageVideo" autoplay playsinline muted></video>
      <img id="firstFramePreview" class="firstFramePreview" alt="" aria-hidden="true">
      <div class="stageVignette" aria-hidden="true"></div>

      <header class="brandOverlay" aria-label="FlashDreams World Model">
        <img class="brandLogo" src="/static/assets/horizontal-dark.svg" alt="FlashDreams">
      </header>

      <section class="statusCard overlayPanel" aria-live="polite">
        <span class="panelLabel">Status</span>
        <div class="statusLine">
          <span id="statusDot" class="statusDot" aria-hidden="true"></span>
          <strong id="statusText">Idle</strong>
        </div>
        <button id="connectButton" class="connectButton" type="button">Connect Session</button>
        <div class="flowLine">
          <span>Flow</span>
          <strong id="flowText">waiting</strong>
        </div>
      </section>

      <section id="sceneCard" class="sceneCard overlayPanel" aria-label="Initial Scene">
        <span class="panelLabel">Initial Scene</span>
        <div id="firstFrameSourceRow" class="firstFrameSourceRow" data-mode="url">
          <div class="sourcePane sourcePaneUpload">
            <button id="uploadModeButton" class="sourceModeButton" type="button">Upload</button>
            <label class="uploadControl">
              <input id="firstFrameInput" type="file" accept="image/*">
              <span id="firstFrameName">Choose Image</span>
            </label>
          </div>
          <div class="sourcePane sourcePaneUrl">
            <button id="urlModeButton" class="sourceModeButton" type="button">URL</button>
            <div class="urlControl">
              <label for="firstFrameUrlInput">Image URL</label>
              <input id="firstFrameUrlInput" type="url" inputmode="url" autocomplete="off">
            </div>
          </div>
          <button id="firstFrameUrlUpdateButton" class="urlUpdateButton" type="button">Update</button>
        </div>
        <div class="firstFrameUpdateRow">
          <span id="firstFrameUrlStatus" class="fieldStatus" role="status" hidden></span>
        </div>
        <label class="promptControl">
          <span>Prompt</span>
          <textarea id="promptInput" rows="4" maxlength="2000"></textarea>
        </label>
        <div class="textEventEditor">
          <div class="textEventHeader">
            <span>Text Events</span>
            <button id="addTextEventButton" class="textEventAddButton" type="button">Add</button>
          </div>
          <div id="textEventList" class="textEventList"></div>
        </div>
      </section>

      <section class="controlCard overlayPanel" aria-label="Controls">
        <h2><span aria-hidden="true"></span>Controls</h2>
        <div class="controlRows">
          <div class="controlRow">
            <div class="keyCluster keyClusterWide">
              <button class="controlKey" type="button" data-control-key="w" aria-label="Forward">W</button>
              <button class="controlKey" type="button" data-control-key="a" aria-label="Turn left">A</button>
              <button class="controlKey" type="button" data-control-key="s" aria-label="Backward">S</button>
              <button class="controlKey" type="button" data-control-key="d" aria-label="Turn right">D</button>
            </div>
            <span>Drive / Turn</span>
          </div>
          <div class="controlRow">
            <div class="keyCluster">
              <button class="controlKey" type="button" data-control-key="q" aria-label="Strafe left">Q</button>
              <button class="controlKey" type="button" data-control-key="e" aria-label="Strafe right">E</button>
            </div>
            <span>Strafe</span>
          </div>
          <div class="controlRow">
            <div class="keyCluster">
              <button class="controlKey" type="button" data-control-key="i" aria-label="Pitch up">I</button>
              <button class="controlKey" type="button" data-control-key="k" aria-label="Pitch down">K</button>
            </div>
            <span>Pitch</span>
          </div>
          <div class="controlRow">
            <div class="keyCluster">
              <button class="controlKey" type="button" data-control-key="j" aria-label="Look left">J</button>
              <button class="controlKey" type="button" data-control-key="l" aria-label="Look right">L</button>
            </div>
            <span>Look</span>
          </div>
        </div>
        <div id="eventControls" class="eventControls" hidden>
          <div id="eventButtons" class="eventButtons"></div>
          <button id="clearEventButton" class="eventButton eventButtonClear" type="button">Clear</button>
        </div>
      </section>

      <section class="logCard overlayPanel" aria-label="Client Logs">
        <h2><span aria-hidden="true"></span>Client Logs</h2>
        <div id="eventLog" class="logList" aria-live="polite"></div>
        <div class="logFooter">
          <span class="liveDot" aria-hidden="true"></span>
          <span id="logState">Waiting</span>
        </div>
      </section>

      <section class="metricsBar" aria-label="Session telemetry">
        <div class="metric">
          <span>FPS</span>
          <strong id="fpsValue">--</strong>
        </div>
        <div class="metric">
          <span>Latency</span>
          <strong id="latencyValue">--</strong>
        </div>
        <div class="metric">
          <span>Resolution</span>
          <strong id="resolutionValue">--</strong>
        </div>
        <div class="metric">
          <span>Step</span>
          <strong id="stepValue">--</strong>
        </div>
        <div class="metric">
          <span>World Model</span>
          <strong id="modelValue">Lingbot</strong>
        </div>
      </section>
    </section>
  </main>

  <script src="/static/request_session.js" type="module"></script>
</body>
</html>
