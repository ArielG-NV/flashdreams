# Fast pre-commit hook for the interactive-drive sample inside the flashdreams
# workspace: ruff lint, ruff format check, and pyright. Tests are NOT run here
# (the headless UI smoke test takes ~8s and would train people to use
# --no-verify). Run `./scripts/check.sh` before pushing / opening a PR to
# exercise pytest as well.
#
# This config is sample-local. The workspace-wide
# ``flashdreams/.pre-commit-config.yaml`` deliberately excludes this subtree
# so the two configs do not double-run conflicting hook versions.
#
# Install once from the flashdreams workspace root:
#   uv run pre-commit install \
#       --config integrations/omnidreams/samples/interactive-drive/.pre-commit-config.yaml
#
# Uninstall:
#   pre-commit uninstall

files: ^integrations/omnidreams/samples/interactive-drive/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  - repo: local
    hooks:
      # ``uv run --no-sync`` skips the implicit ``uv sync`` that ``uv run``
      # otherwise performs on every invocation. The hooks should validate the
      # code being committed, not re-resolve and re-install the venv on every
      # commit; ``scripts/check.sh`` is the canonical full check and still
      # goes through plain ``uv run`` so it does pick up dep changes.
      # Hooks are launched from the flashdreams workspace root by
      # pre-commit. ``cd`` into the sample so ruff/pyright pick up the
      # sample-local config, and pass ``uv --project .`` (== workspace
      # root before the cd) so uv keeps using the workspace member set
      # rather than treating the sample as a stray single-project
      # workspace (astral-sh/uv#16640).
      - id: ruff-check
        name: ruff check
        language: system
        entry: bash -c 'WS="$PWD"; cd integrations/omnidreams/samples/interactive-drive && uv --project "$WS" run --no-sync --package omnidreams-interactive-drive --extra dev ruff check .'
        types_or: [python, pyi]
        pass_filenames: false

      - id: ruff-format
        name: ruff format --check
        language: system
        entry: bash -c 'WS="$PWD"; cd integrations/omnidreams/samples/interactive-drive && uv --project "$WS" run --no-sync --package omnidreams-interactive-drive --extra dev ruff format --check .'
        types_or: [python, pyi]
        pass_filenames: false

      - id: pyright
        name: pyright
        language: system
        entry: bash -c 'WS="$PWD"; cd integrations/omnidreams/samples/interactive-drive && uv --project "$WS" run --no-sync --package omnidreams-interactive-drive --extra dev --extra ui --extra world-model pyright'
        types_or: [python, pyi]
        pass_filenames: false
