<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Omnidreams WebRTC Drive</title>
  <link rel="stylesheet" href="/static/request_session.css">
</head>
<body>
  <main class="appShell">
    <section class="stage" aria-label="Omnidreams WebRTC Drive">
      <h1 class="srOnly">Omnidreams WebRTC Drive</h1>
      <div class="stageBackdrop" aria-hidden="true"></div>
      <canvas id="idleCanvas" class="idleCanvas" aria-hidden="true"></canvas>
      <video id="remoteVideo" class="stageVideo" autoplay playsinline muted></video>
      <div class="stageVignette" aria-hidden="true"></div>

      <header class="brandOverlay" aria-label="FlashDreams World Model">
        <img class="brandLogo" src="/assets/logo/horizontal-light.svg" alt="FlashDreams">
      </header>

      <section class="statusCard overlayPanel" aria-live="polite">
        <span class="panelLabel">Status</span>
        <div class="statusLine">
          <span id="statusDot" class="statusDot" aria-hidden="true"></span>
          <strong id="statusText">Idle</strong>
        </div>
        <button id="connectButton" class="connectButton" type="button">Connect Session</button>
        <div class="flowLine">
          <span>Flow</span>
          <strong id="flowText">waiting</strong>
        </div>
      </section>

      <section class="controlCard overlayPanel" aria-label="Controls">
        <h2><span aria-hidden="true"></span>Controls</h2>
        <div class="controlRows">
          <div class="controlRow">
            <div class="keyCluster keyClusterWide">
              <button class="controlKey" type="button" data-control-key="w" aria-label="Forward">W</button>
              <button class="controlKey" type="button" data-control-key="a" aria-label="Turn left">A</button>
              <button class="controlKey" type="button" data-control-key="s" aria-label="Backward">S</button>
              <button class="controlKey" type="button" data-control-key="d" aria-label="Turn right">D</button>
            </div>
            <span>Drive / Turn</span>
          </div>
        </div>
      </section>

      <section class="logCard overlayPanel" aria-label="Client Logs">
        <h2><span aria-hidden="true"></span>Client Logs</h2>
        <div id="eventLog" class="logList" aria-live="polite"></div>
        <div class="logFooter">
          <span class="liveDot" aria-hidden="true"></span>
          <span id="logState">Waiting</span>
        </div>
      </section>

      <section class="metricsBar" aria-label="Session telemetry">
        <div class="metric">
          <span>FPS</span>
          <strong id="fpsValue">--</strong>
        </div>
        <div class="metric">
          <span>Latency</span>
          <strong id="latencyValue">--</strong>
        </div>
        <div class="metric">
          <span>Resolution</span>
          <strong id="resolutionValue">--</strong>
        </div>
        <div class="metric">
          <span>Step</span>
          <strong id="stepValue">--</strong>
        </div>
        <div class="metric">
          <span>World Model</span>
          <strong id="modelValue">Omnidreams</strong>
        </div>
      </section>
    </section>
  </main>

  <script src="/static/request_session.js" type="module"></script>
</body>
</html>
