name: CI

on:
  push:
    branches:
      - main
      - "pull-request/[0-9]+"
    tags:
      - '**'
  # `merge_group` fires when a PR enters GitHub's merge queue. GitHub creates
  # a temporary `gh-readonly-queue/main/pr-<n>-<sha>` ref containing the PR
  # rebased on top of `main` + any earlier queued PRs and runs the required
  # checks against it. The job names below must match the required-check
  # names configured in branch protection.
  merge_group:
    branches: [main]

jobs:
  lint:
    runs-on: linux-amd64-cpu8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: |
          # ty needs third-party packages to resolve imports. Skip packages
          # that cannot be installed on CPU-only runners:
          # - transformer-engine-torch: source-only, requires CUDA to compile
          uv sync --extra dev --group lint \
            --no-install-package transformer-engine-torch

      - name: Run linter checks
        run: uv run --no-sync pre-commit run -a

  cpu:
    runs-on: linux-amd64-cpu8
    container:
      image: nvidia/cuda:13.2.1-cudnn-devel-ubuntu24.04
    env:
      UV_PROJECT_ENVIRONMENT: /tmp/flashdreams-venv
    steps:
      - name: Get PR info
        if: startsWith(github.ref_name, 'pull-request/')
        id: get-pr-info
        uses: nv-gha-runners/get-pr-info@main

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends \
            python3 python3-dev python3-venv \
            ffmpeg \
            gcc g++ ninja-build \
            libnccl-dev \
            curl git ca-certificates unzip
          rm -rf /var/lib/apt/lists/*

      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Build flashdreams wheel
        run: |
          uv run .github/scripts/sync_version.py || true
          uv build --wheel --package flashdreams

      - name: Install test dependencies
        run: |
          uv venv --clear
          uv sync --extra dev

      - name: Run CPU unit tests
        run: uv run --no-sync pytest -m ci_cpu -v

      # Documentation is built and deployed by `.github/workflows/doc.yml`.

  gpu:
    runs-on: linux-amd64-gpu-rtxpro6000-latest-2
    timeout-minutes: 30
    container:
      image: nvidia/cuda:13.2.1-cudnn-devel-ubuntu24.04
      options: --gpus all
    env:
      # Place the venv outside the workspace so uv does not interfere with
      # the checkout directory owned by the runner.
      UV_PROJECT_ENVIRONMENT: /tmp/flashdreams-venv
    steps:
      - name: Get PR info
        if: startsWith(github.ref_name, 'pull-request/')
        id: get-pr-info
        uses: nv-gha-runners/get-pr-info@main

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends \
            python3 python3-dev python3-venv \
            ffmpeg \
            gcc g++ ninja-build \
            libnccl-dev \
            curl git ca-certificates unzip
          rm -rf /var/lib/apt/lists/*

      - name: Setup proxy cache
        uses: nv-gha-runners/setup-proxy-cache@main

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: |
          uv venv --clear
          uv sync --extra dev

      - name: Verify GPU availability
        run: |
          echo "Verifying GPU access..."
          nvidia-smi

      - name: Run GPU unit tests
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: uv run --no-sync pytest -m ci_gpu -v

  # ===========================================================================
  # Publish to Test PyPI -- runs only on main after lint passes.
  # TEMPORARY: targets test.pypi.org while the project is pre-release.
  # Switch --publish-url/--check-url to the real PyPI endpoints and the
  # secret to PYPI_API_TOKEN when going public.
  # ===========================================================================
  publish-testpypi:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint]
    runs-on: linux-amd64-cpu8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Sync versions
        run: uv run .github/scripts/sync_version.py || true

      - name: Build wheel
        run: uv build --wheel --package flashdreams

      - name: Previously published check
        id: previously_published
        run: |
          version=$(sed -n 's/^__version__ = "\(.*\)"/\1/p' flashdreams/flashdreams/_version.py)
          echo "version=$version"
          if curl -sSf "https://test.pypi.org/simple/flashdreams/" \
             | grep -q "flashdreams-${version}-"; then
            echo "Version $version already exists on Test PyPI -- skipping publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version $version not found on Test PyPI -- will publish"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to Test PyPI
        if: steps.previously_published.outputs.skip != 'true'
        run: >
          uv publish
          --publish-url https://test.pypi.org/legacy/
          --check-url https://test.pypi.org/simple/
          --token ${{ secrets.TEST_PYPI_API_TOKEN }}
          dist/*
